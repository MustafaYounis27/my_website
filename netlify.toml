[build]
  command = "bash ./netlify_build.sh"
  publish = "build/web"

# Optional environment hints
[build.environment]
  PUB_CACHE = "/opt/buildhome/.pub-cache"
  NODE_OPTIONS = "--max-old-space-size=4096"

# SPA-style routing so deep links work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
